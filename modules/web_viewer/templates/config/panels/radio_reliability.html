<section class="card mb-4 config-panel-card" id="radio-reliability">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i class="fas fa-broadcast-tower me-2"></i>Radio Reliability</h5>
    </div>
    <div class="card-body">
        <div class="row g-4">
            <div class="col-lg-6">
                <h6 class="text-uppercase text-muted fw-semibold mb-3" style="font-size:.75rem;letter-spacing:.05em;">
                    Zombie Radio Alert
                </h6>
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="zombie-alert-enabled-toggle" role="switch">
                    <label class="form-check-label" for="zombie-alert-enabled-toggle">
                        Send email alert when zombie radio state is detected
                    </label>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="zombie-alert-email">Alert recipient(s)</label>
                    <input type="text" class="form-control" id="zombie-alert-email"
                           placeholder="ops@example.com, admin@example.com">
                    <div class="form-text">
                        Comma-separated addresses. Leave blank to fall back to nightly recipients.
                    </div>
                </div>
                <div class="small text-muted mb-3">
                    config.ini baseline:
                    <span id="zombie-alert-ini-summary">loading...</span>
                </div>
                <div class="d-flex gap-2 align-items-center flex-wrap">
                    <button type="button" class="btn btn-primary" id="save-zombie-alert-btn">
                        <i class="fas fa-save me-1"></i>Save
                    </button>
                    <button type="button" class="btn btn-outline-secondary" id="save-zombie-alert-config-btn">
                        <i class="fas fa-file-export me-1"></i>Save to config.ini
                    </button>
                    <span id="zombie-alert-status" class="small" style="display:none;"></span>
                </div>
            </div>

            <div class="col-lg-6">
                <h6 class="text-uppercase text-muted fw-semibold mb-3" style="font-size:.75rem;letter-spacing:.05em;">
                    Radio Debug Logging
                </h6>
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="radio-debug-enabled-toggle" role="switch">
                    <label class="form-check-label" for="radio-debug-enabled-toggle">
                        Enable detailed radio debug logs
                    </label>
                </div>
                <div class="small text-muted mb-3">
                    config.ini baseline:
                    <span id="radio-debug-ini-summary">loading...</span>
                </div>
                <div class="d-flex gap-2 align-items-center flex-wrap">
                    <button type="button" class="btn btn-primary" id="save-radio-debug-btn">
                        <i class="fas fa-save me-1"></i>Save
                    </button>
                    <button type="button" class="btn btn-outline-secondary" id="save-radio-debug-config-btn">
                        <i class="fas fa-file-export me-1"></i>Save to config.ini
                    </button>
                    <button type="button" class="btn btn-warning" id="apply-radio-debug-btn">
                        <i class="fas fa-plug me-1"></i>Save + Reconnect
                    </button>
                </div>
                <div class="form-text mt-2">
                    Reconnect applies debug mode immediately without restarting the bot.
                </div>
                <span id="radio-debug-status" class="small" style="display:none;"></span>
            </div>
        </div>
    </div>
</section>
