[pytest]
# Pytest configuration for meshcore-bot tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Async test support
asyncio_mode = auto

# Hard limit every test to 30 s; prevents hangs from blocking I/O or infinite loops.
# Individual tests that legitimately need longer can use @pytest.mark.timeout(N).
timeout = 30
timeout_method = thread

# Coverage configuration (optional)
# [tool:pytest]
# addopts = --cov=modules --cov-report=html --cov-report=term-missing

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=modules
    --cov-report=term-missing

# Markers for test categorization
markers =
    unit: Unit tests (isolated, with mocks)
    integration: Integration tests (with real database)
    slow: Slow running tests
    mqtt: Live MQTT integration tests (require network access to letsmesh broker)
